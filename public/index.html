<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>稻田摸鱼</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #dff2ec;
      overflow: hidden;
    }
    main {
      position: relative;
      width: min(100vw, 430px);
      height: 100svh;
      min-height: 620px;
      margin: 0 auto;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), rgba(0,44,38,.08)),
        url("ricefield-bg.png") center / 100% 100% no-repeat;
      box-shadow: 0 0 28px rgba(32,76,66,.18);
    }
    .top {
      position: absolute;
      left: 8px;
      right: 8px;
      top: calc(max(6px, env(safe-area-inset-top)) + 0px);
      z-index: 30;
      display: grid;
      gap: 5px;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .logo { display: grid; place-items: center; width: 31px; height: 31px; border-radius: 50%; background: rgba(255,247,204,.9); box-shadow: inset 0 0 0 2px #d4b04c, 0 2px 8px rgba(0,0,0,.16); font-size: 18px; }
    h1 {
      margin: 0;
      color: #13242c;
      font-size: clamp(27px, 8vw, 38px);
      line-height: .95;
      text-shadow: 0 1px 2px rgba(255,255,255,.9), 0 3px 10px rgba(0,0,0,.18);
    }
    .nav-row { display: flex; align-items: center; gap: 7px; flex-wrap: nowrap; }
    .bubble {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 5px 9px;
      border-radius: 999px;
      color: #123f45;
      background: rgba(248,255,252,.34);
      border: 1px solid rgba(235,255,250,.72);
      box-shadow: 0 3px 10px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.56);
      backdrop-filter: blur(8px) saturate(1.2);
      text-decoration: none;
      font-weight: 950;
      font-size: 12px;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(255,255,255,.9);
    }
    .spacer { flex: 1; min-width: 0; }
    .account { color: #13242c; font-size: 10px; font-weight: 950; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; text-shadow: 0 1px 2px rgba(255,255,255,.95); }
    .account.active { max-width: 118px; padding: 5px 7px; border-radius: 999px; background: rgba(248,255,252,.32); border: 1px solid rgba(235,255,250,.72); backdrop-filter: blur(8px); }
    button, input, select, textarea { font: inherit; }
    button { border: 0; border-radius: 8px; padding: 10px 12px; color: #fff; background: #123f45; font-weight: 900; cursor: pointer; }
    button.secondary { background: #4b6f73; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .auth, .panel, .paytable, .draw-panel {
      border: 1px solid #a9cdc6;
      border-radius: 8px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 14px 34px rgba(45,86,82,.12);
    }
    .auth {
      display: none;
      padding: 7px;
      width: 100%;
      background: rgba(248,255,252,.34);
      border-color: rgba(235,255,250,.72);
      backdrop-filter: blur(10px) saturate(1.2);
    }
    .auth.open { display: block; }
    .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .auth input { width: 100%; border: 1px solid #b7d6d0; border-radius: 8px; padding: 7px; background: rgba(255,255,255,.9); min-width: 0; }
    .layout { display: contents; }
    .paytable {
      position: absolute;
      left: 6px;
      top: calc(max(6px, env(safe-area-inset-top)) + 78px);
      z-index: 20;
      width: calc(53% - 9px);
      overflow: hidden;
      color: #13242c;
      background: rgba(248,255,252,.30);
      border-color: rgba(235,255,250,.72);
      box-shadow: 0 8px 22px rgba(0,0,0,.13), inset 0 1px 0 rgba(255,255,255,.45);
      backdrop-filter: blur(8px) saturate(1.22);
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(255,255,255,.9);
    }
    .paytable h2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin: 0;
      padding: 4px 5px;
      font-size: 11px;
      border-bottom: 1px solid rgba(235,255,250,.45);
      white-space: nowrap;
    }
    .paytable h2 span { color: #9f1239; font-size: 8px; font-weight: 950; }
    .odds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .odds-grid table + table { border-left: 1px solid rgba(235,255,250,.42); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 3px 7px; border-bottom: 1px solid #d7e9e5; text-align: left; white-space: nowrap; }
    th:last-child, td:last-child { text-align: right; font-weight: 900; }
    .paytable table { font-size: 8px; color: #172b35; }
    .paytable td { padding: 3px 4px; border-bottom: 1px solid rgba(235,255,250,.42); }
    .win { color: #0f766e; }
    .lose { color: #b91c1c; }
    .draw-stack {
      position: absolute;
      right: 6px;
      top: calc(max(6px, env(safe-area-inset-top)) + 78px);
      z-index: 21;
      width: calc(47% - 9px);
      display: grid;
      grid-template-rows: auto auto;
      gap: 5px;
      pointer-events: none;
    }
    .draw-panel {
      padding: 5px;
      color: #122833;
      background: rgba(248,255,252,.30);
      border-color: rgba(235,255,250,.72);
      box-shadow: 0 8px 22px rgba(0,0,0,.13), inset 0 1px 0 rgba(255,255,255,.45);
      backdrop-filter: blur(8px) saturate(1.22);
      text-shadow: 0 1px 2px rgba(255,255,255,.9);
      pointer-events: none;
    }
    .round { display: flex; justify-content: space-between; gap: 6px; font-size: 11px; font-weight: 950; }
    .hint { margin: 2px 0 4px; color: #203a43; font-size: 8px; line-height: 1.2; min-height: 10px; font-weight: 850; }
    .draw-table { table-layout: fixed; border-radius: 7px; overflow: hidden; box-shadow: 0 0 0 1px rgba(235,255,250,.58); }
    .draw-table th, .draw-table td { text-align: center; border: 1px solid rgba(235,255,250,.5); background: rgba(248,255,252,.26); padding: 1px; }
    .draw-table th { height: 23px; }
    .draw-table td { font-size: 17px; color: #083f46; font-weight: 950; }
    .draw-fish { display: grid; place-items: center; height: 21px; }
    .result {
      position: relative;
      min-height: 42px;
      margin-top: 4px;
      padding: 8px 74px 8px 6px;
      border: 1px solid rgba(235,255,250,.58);
      border-radius: 7px;
      background: rgba(248,255,252,.26);
      display: flex;
      align-items: center;
    }
    .result-title { margin: 0; font-size: 15px; font-weight: 950; }
    .score { margin: 0 0 1px; font-size: 9px; font-weight: 950; }
    .board-wrap {
      position: absolute;
      inset: 0;
      z-index: 5;
      width: 100%;
      height: 100%;
      aspect-ratio: auto;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
    }
    .board { position: absolute; inset: 0; display: block; }
    .tank {
      position: absolute;
      width: 14.8%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 7px;
      background: transparent;
      overflow: hidden;
      cursor: pointer;
      transition: transform .13s ease, box-shadow .13s ease, border-color .13s ease, background .13s ease;
    }
    .tank:not(.opened):hover { transform: translate(-50%, -50%) translateY(-2px); border-color: rgba(255,255,255,.8); background: rgba(255,255,255,.08); }
    .tank::before {
      content: "";
      position: absolute;
      left: 10%; right: 10%; top: 22%; height: 57%;
      border-radius: 8px 8px 12px 12px;
      background: radial-gradient(ellipse at 28% 16%, rgba(255,255,255,.72), transparent 24%), linear-gradient(180deg, rgba(217,249,255,.84), rgba(88,194,211,.72));
      border: 1px solid rgba(74,133,144,.45);
      box-shadow: inset 0 -8px 14px rgba(55,140,158,.2);
      animation: waterBreath 3.6s ease-in-out infinite;
    }
    .tank::after {
      content: "";
      position: absolute;
      left: 12%; right: 12%; top: 8%; height: 17%;
      border-radius: 999px 999px 5px 5px;
      background: repeating-linear-gradient(90deg, rgba(91,51,24,.18) 0 5px, transparent 5px 10px), linear-gradient(180deg, #d2a65e, #8a5a2d);
      z-index: 4;
    }
    .tank.opened::after { transform: translateY(-30px) rotate(-11deg); opacity: 0; }
    .tank.opened::before { opacity: .36; transform: scale(.9); }
    @keyframes waterBreath { 0%,100% { opacity:.82; transform:scale(.985); } 50% { opacity:1; transform:scale(1.025); } }
    .cover-mark { z-index: 5; display: grid; place-items: center; width: 42%; aspect-ratio: 1; border-radius: 50%; background: rgba(255,250,214,.82); color: #5c3a1c; font-weight: 900; }
    .tank.opened .cover-mark { opacity: 0; transform: scale(.7); pointer-events: none; }
    .fish { position: absolute; left: 50%; top: 52%; z-index: 6; opacity: 0; transform: translate(-50%, -50%) scale(.75); width: min(72%, 58px); display: grid; place-items: center; }
    .tank.opened .fish { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .fish svg { width: 100%; height: auto; overflow: visible; filter: drop-shadow(0 3px 4px rgba(20,76,84,.18)); }
    .eel { width: min(86%, 64px); }
    .draw-fish .fish { position: static; opacity: 1; transform: none; width: 30px; }
    .draw-fish .eel { width: 34px; }
    @media (max-width: 480px) {
      main { width: 100vw; min-height: 0; }
      .logo { width: 30px; height: 30px; font-size: 18px; }
      h1 { font-size: 30px; }
      .bubble { min-height: 25px; padding: 5px 8px; font-size: 12px; }
      .account { max-width: 96px; font-size: 10px; }
      .auth-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
      .auth input, .auth button { font-size: 12px; padding: 6px; }
      .paytable table { font-size: 8px; }
      .paytable h2 { font-size: 11px; padding: 4px 5px; }
      .paytable h2 span { font-size: 8px; }
      .draw-panel { padding: 5px; }
      .round { font-size: 11px; }
      .draw-table th { height: 23px; }
      .draw-table td { font-size: 17px; }
      .result { min-height: 42px; }
      #startBtn { padding: 7px 8px; }
      .tank { width: 14.8%; }
      .cover-mark { font-size: 11px; }
    }
    #startBtn {
      position: absolute;
      right: 4px;
      bottom: 4px;
      min-height: 28px;
      width: 64px;
      padding: 5px 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, #155e63, #0f3f45);
      box-shadow: 0 0 0 0 rgba(16,185,129,.44), 0 12px 26px rgba(15,63,69,.26);
      font-size: 11px;
      line-height: 1;
      animation: startBreath 2.2s ease-in-out infinite;
      pointer-events: auto;
    }
    #startBtn:disabled { animation: none; box-shadow: none; }
    @keyframes startBreath {
      0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 0 rgba(20,184,166,.38), 0 12px 26px rgba(15,63,69,.26); }
      50% { transform: translateY(-1px) scale(1.018); box-shadow: 0 0 18px 6px rgba(20,184,166,.42), 0 16px 32px rgba(15,63,69,.34); }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div class="brand">
        <span class="logo" aria-hidden="true">🐟</span>
        <h1>稻田摸鱼</h1>
      </div>
      <div class="nav-row">
        <a class="bubble" href="/guide.html">游戏说明</a>
        <a class="bubble" href="/games.html">游戏大厅</a>
        <a class="bubble" href="/fishing.html">湖畔钓鱼</a>
        <a class="bubble" href="/fishing-office.html">上班摸鱼</a>
        <a class="bubble" href="/wallet.html">钱包</a>
        <button class="bubble" id="authToggle" type="button">登录</button>
        <span class="spacer"></span>
        <a class="account" id="userInfo" href="/wallet.html" title="进入钱包修改账号名称"></a>
      </div>
      <section class="auth" id="authBox">
        <div class="auth-grid">
          <input id="username" placeholder="用户名">
          <input id="password" type="password" placeholder="密码">
          <input id="referralCode" placeholder="推荐码，可不填">
          <button id="loginBtn">登录</button>
          <button id="registerBtn" class="secondary">注册</button>
        </div>
      </section>
    </div>

    <section class="layout">
      <div class="paytable">
        <h2>赔率表 <span>5、4、3 输10</span></h2>
        <div class="odds-grid">
          <table>
            <tbody>
              <tr><td>8、4、0</td><td class="win">赢100</td></tr>
              <tr><td>7、5、0</td><td class="win">赢20</td></tr>
              <tr><td>6、6、0</td><td class="win">赢20</td></tr>
              <tr><td>8、3、1</td><td class="win">赢20</td></tr>
              <tr><td>8、2、2</td><td class="win">赢20</td></tr>
              <tr><td>7、4、1</td><td class="win">赢20</td></tr>
            </tbody>
          </table>
          <table>
            <tbody>
              <tr><td>7、3、2</td><td class="win">赢20</td></tr>
              <tr><td>6、5、1</td><td class="win">赢20</td></tr>
              <tr><td>6、4、2</td><td class="win">赢1</td></tr>
              <tr><td>6、3、3</td><td class="win">赢1</td></tr>
              <tr><td>5、5、2</td><td class="win">赢1</td></tr>
              <tr><td>4、4、4</td><td class="win">赢1</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="draw-stack">
        <section class="draw-panel">
          <div class="round"><span>已摸次数</span><span><b id="openedCount">0</b>/12</span></div>
          <p class="hint" id="statusText">请先登录，然后点击开局。</p>
          <table class="draw-table">
            <thead><tr><th><span class="draw-fish draw-yellow"></span></th><th><span class="draw-fish draw-grouper"></span></th><th><span class="draw-fish draw-eel"></span></th></tr></thead>
            <tbody><tr><td id="yellowCount">0</td><td id="grouperCount">0</td><td id="eelCount">0</td></tr></tbody>
          </table>
          <div class="result" id="resultBox">
            <p class="result-title" id="resultText">等待开局</p>
            <button id="startBtn">开始新局</button>
          </div>
        </section>
      </div>
      <div class="board-wrap"><div class="board" id="board"></div></div>
    </section>

  </main>

  <script>
    const tokenKey = "moyu_token";
    const fishLabels = { yellow: "黄鱼", grouper: "石斑鱼", eel: "鳗鱼" };
    const tankPositions = [
      [26.0, 37.5], [43.0, 37.5], [60.0, 37.5], [77.0, 37.5],
      [26.0, 46.5], [43.0, 46.5], [60.0, 46.5], [77.0, 46.5],
      [26.0, 55.5], [43.0, 55.5], [60.0, 55.5], [77.0, 55.5],
      [26.0, 64.5], [43.0, 64.5], [60.0, 64.5], [77.0, 64.5],
      [26.0, 73.5], [43.0, 73.5], [60.0, 73.5], [77.0, 73.5],
      [26.0, 82.5], [43.0, 82.5], [60.0, 82.5], [77.0, 82.5]
    ];
    let me = null;
    let roundId = null;
    let finished = false;
    let counts = { yellow: 0, grouper: 0, eel: 0 };

    const qs = (s) => document.querySelector(s);
    const board = qs("#board");

    function fishSvg(type) {
      if (type === "yellow") return `<span class="fish yellow"><svg viewBox="0 0 170 86"><path d="M135 38 L166 18 Q172 43 165 67 L135 51 Z" fill="#e99524"/><path d="M55 25 C74 5 104 1 136 16 C118 18 95 23 70 35 Z" fill="#d89024"/><path d="M21 29 C43 8 96 8 139 30 C154 38 154 49 139 58 C93 83 39 75 17 54 C4 42 8 35 21 29 Z" fill="#f0b33b"/><path d="M17 30 C35 15 53 19 61 43 C50 69 31 68 15 53 C5 42 8 35 17 30 Z" fill="#9b7145"/><path d="M62 31 C75 27 91 28 111 36 M60 43 C79 39 102 42 126 50 M55 55 C73 57 93 58 118 56" fill="none" stroke="#9a743e" stroke-width="3" stroke-linecap="round"/><circle cx="31" cy="35" r="6" fill="#101820"/><circle cx="33" cy="33" r="2" fill="#fff"/></svg></span>`;
      if (type === "grouper") return `<span class="fish grouper"><svg viewBox="0 0 178 88"><path d="M132 36 L172 14 Q179 43 169 71 L132 56 Z" fill="#3c4143"/><path d="M55 22 L67 3 L74 23 L84 5 L91 23 L102 7 L108 24 L122 10 L124 29 C102 24 80 22 55 22 Z" fill="#202528"/><path d="M20 28 C43 7 105 10 141 30 C158 39 159 51 142 61 C102 83 45 78 18 58 C3 47 5 36 20 28 Z" fill="#59636a"/><g fill="#111820"><circle cx="64" cy="38" r="3"/><circle cx="76" cy="47" r="3"/><circle cx="91" cy="36" r="3"/><circle cx="102" cy="49" r="3"/><circle cx="117" cy="39" r="3"/><circle cx="130" cy="52" r="3"/></g><circle cx="36" cy="35" r="7" fill="#d7d27a"/><circle cx="38" cy="34" r="4" fill="#111820"/></svg></span>`;
      return `<span class="fish eel"><svg viewBox="0 0 180 82"><path d="M15 48 C43 16 86 17 109 40 C130 61 151 61 166 43" fill="none" stroke="#eef2ef" stroke-width="20" stroke-linecap="round" opacity=".82"/><path d="M15 48 C43 16 86 17 109 40 C130 61 151 61 166 43" fill="none" stroke="#2b2925" stroke-width="13" stroke-linecap="round"/><path d="M29 51 C57 38 83 34 106 45 C125 54 143 56 157 45" fill="none" stroke="#d6c3ad" stroke-width="4" stroke-linecap="round"/><path d="M154 42 C162 34 173 36 177 44 C171 51 160 51 154 45 Z" fill="#253036"/><circle cx="168" cy="42" r="3.4" fill="#eef7f8"/><circle cx="169" cy="42" r="1.8" fill="#101820"/></svg></span>`;
    }

    qs(".draw-yellow").innerHTML = fishSvg("yellow");
    qs(".draw-grouper").innerHTML = fishSvg("grouper");
    qs(".draw-eel").innerHTML = fishSvg("eel");

    async function api(path, options = {}) {
      const headers = { "content-type": "application/json", ...(options.headers || {}) };
      const token = localStorage.getItem(tokenKey);
      if (token) headers.authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    function updateAuth() {
      qs("#authBox").classList.toggle("open", false);
      qs("#authToggle").textContent = me ? "退出" : "登录";
      if (me) {
        qs("#userInfo").textContent = `${me.displayName || me.username} | 积分 ${me.balance}`;
        qs("#userInfo").classList.add("active");
      } else {
        qs("#userInfo").textContent = "";
        qs("#userInfo").classList.remove("active");
      }
    }

    function renderIdleResult() {
      qs("#resultBox").className = "result";
      qs("#statusText").textContent = me ? "点击开始新局，然后打开 12 个鱼缸。" : "请先登录，然后点击开局。";
      qs("#resultText").textContent = "等待开局";
    }

    function resetBoard() {
      board.innerHTML = "";
      for (let i = 0; i < 24; i++) {
        const btn = document.createElement("button");
        btn.className = "tank";
        btn.type = "button";
        btn.dataset.index = i;
        const [left, top] = tankPositions[i];
        btn.style.left = `${left}%`;
        btn.style.top = `${top}%`;
        btn.innerHTML = `<span class="cover-mark">?</span>`;
        btn.addEventListener("click", () => openTank(i, btn));
        board.appendChild(btn);
      }
      counts = { yellow: 0, grouper: 0, eel: 0 };
      renderCounts();
      qs("#openedCount").textContent = "0";
    }

    function renderCounts() {
      qs("#yellowCount").textContent = counts.yellow;
      qs("#grouperCount").textContent = counts.grouper;
      qs("#eelCount").textContent = counts.eel;
    }

    async function loadMe() {
      const token = localStorage.getItem(tokenKey);
      if (!token) { updateAuth(); resetBoard(); renderIdleResult(); return; }
      try {
        const data = await api("/api/me");
        me = data.user;
      } catch {
        localStorage.removeItem(tokenKey);
        me = null;
      }
      updateAuth();
      resetBoard();
      renderIdleResult();
    }

    async function auth(mode) {
      try {
        const username = qs("#username").value.trim();
        const password = qs("#password").value;
        const referralCode = qs("#referralCode").value.trim();
        const data = await api(mode === "login" ? "/api/auth/login" : "/api/auth/register", { method: "POST", body: JSON.stringify({ username, password, referralCode }) });
        localStorage.setItem(tokenKey, data.token);
        me = data.user;
        updateAuth();
        resetBoard();
        renderIdleResult();
      } catch (error) { alert(error.message); }
    }

    async function startRound() {
      if (!me) return alert("请先登录");
      const data = await api("/api/game/start", { method: "POST", body: "{}" });
      roundId = data.roundId;
      finished = false;
      resetBoard();
      qs("#statusText").textContent = "点击鱼缸开始摸鱼。";
      qs("#resultBox").className = "result";
      qs("#resultText").textContent = "摸鱼中";
    }

    async function openTank(index, btn) {
      if (!roundId || finished || btn.classList.contains("opened")) return;
      try {
        const data = await api("/api/game/open", { method: "POST", body: JSON.stringify({ roundId, index }) });
        btn.classList.add("opened");
        btn.innerHTML += fishSvg(data.fish);
        counts = data.counts;
        renderCounts();
        qs("#openedCount").textContent = data.opened.length;
        if (data.finished) {
          finished = true;
          data.result.allFish.forEach((fish, i) => {
            const tank = board.querySelector(`[data-index="${i}"]`);
            if (!tank.classList.contains("opened")) {
              tank.classList.add("opened");
              tank.innerHTML += fishSvg(fish);
            }
          });
          me.balance = data.result.balance;
          const score = data.result.score;
          const combo = data.result.combo.split("").join("、");
          const resultText = score >= 0 ? `赢${Math.abs(score)}积分` : `输${Math.abs(score)}积分`;
          qs("#resultBox").className = `result ${score >= 0 ? "win" : "lose"}`;
          qs("#resultText").textContent = resultText;
          qs("#statusText").textContent = `本局结束，数量组合为 ${combo}。`;
          updateAuth();
        } else {
          qs("#statusText").textContent = `摸到了${data.label}，还剩 ${12 - data.opened.length} 次。`;
        }
      } catch (error) { alert(error.message); }
    }

    qs("#loginBtn").onclick = () => auth("login");
    qs("#registerBtn").onclick = () => auth("register");
    qs("#authToggle").onclick = () => {
      if (me) {
        localStorage.removeItem(tokenKey);
        me = null;
        roundId = null;
        updateAuth();
        resetBoard();
        renderIdleResult();
        return;
      }
      qs("#authBox").classList.toggle("open");
    };
    qs("#startBtn").onclick = startRound;
    loadMe();
  </script>
</body>
</html>
