<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>摸鱼游戏平台</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #23313d;
      --muted: #667085;
      --line: #d9e4df;
      --paper: #f5faf7;
      --panel: rgba(255,255,255,.88);
      --green: #168f6f;
      --amber: #d9822b;
      --blue: #2876d7;
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255,255,255,.52) 0 1px, transparent 1px 72px),
        linear-gradient(180deg, #edf5f1, #dce8e5);
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    .shell {
      width: min(1180px, calc(100vw - 24px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px 0;
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 34px rgba(54,83,87,.1);
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: #e7fff5;
      border: 1px solid #b9dfd1;
      color: #0d6c58;
      font-weight: 950;
    }
    h1 { margin: 0; font-size: clamp(24px, 5vw, 38px); line-height: 1; letter-spacing: 0; }
    .sub { display: block; margin-top: 5px; color: var(--muted); font-size: 13px; font-weight: 850; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill, .nav a {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #24444d;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .overview {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 34px rgba(54,83,87,.08);
    }
    .metric strong { display: block; font-size: 26px; color: #0d6c58; line-height: 1; }
    .metric span { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; font-weight: 850; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .game-card {
      min-height: 430px;
      display: grid;
      grid-template-rows: 174px 1fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(54,83,87,.12);
    }
    .scene {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ecf7f1, #cfe0d9);
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.42) 0 1px, transparent 1px 58px);
      opacity: .55;
    }
    .scene.tank {
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), transparent 35%),
        linear-gradient(180deg, #aadcd5 0 45%, #d3b184 45% 100%);
    }
    .scene.lake {
      background:
        radial-gradient(ellipse at 65% 72%, #4aa7a2 0 28%, transparent 29%),
        linear-gradient(180deg, #bcd9e6 0 48%, #86b97b 48% 100%);
    }
    .scene.office {
      background:
        linear-gradient(180deg, #eaf2ef 0 43%, #d9b98f 43%),
        radial-gradient(ellipse at 72% 65%, #53c0ba 0 20%, transparent 21%);
    }
    .visual-fish {
      position: absolute;
      width: 58px;
      height: 22px;
      border-radius: 50%;
      left: var(--x);
      top: var(--y);
      background: var(--c);
      box-shadow: inset 0 -6px 10px rgba(0,0,0,.12);
      animation: drift var(--d, 6s) ease-in-out infinite;
    }
    .visual-fish::after {
      content: "";
      position: absolute;
      right: -12px;
      top: 5px;
      border-left: 14px solid rgba(0,0,0,.28);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }
    @keyframes drift { 0%,100% { transform: translateX(-8px); } 50% { transform: translateX(18px); } }
    .desk-line {
      position: absolute;
      left: 10%;
      bottom: 19%;
      width: 42%;
      height: 36px;
      border-radius: 8px;
      background: repeating-linear-gradient(90deg, #f8fbf9 0 18px, #d7dfdb 18px 21px);
      transform: skewX(-8deg);
      box-shadow: 0 10px 18px rgba(86,65,42,.18);
    }
    .mini-water {
      position: absolute;
      right: 10%;
      bottom: 18%;
      width: 37%;
      aspect-ratio: 1.55;
      border-radius: 50%;
      background: radial-gradient(ellipse at 58% 32%, rgba(255,255,255,.56), transparent 24%), linear-gradient(180deg, #6ed8d2, #248d9a);
      border: 5px solid rgba(255,255,255,.72);
    }
    .content {
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .card-head { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .card-head h2 { margin: 0; font-size: 20px; }
    .status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid #cae5dc;
      background: #effbf6;
      color: #0d6c58;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }
    .status.testing { border-color: #bdd8f5; background: #eef6ff; color: #255c9d; }
    .status.prototype { border-color: #edd3a6; background: #fff8ea; color: #895a13; }
    .desc { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.5; font-weight: 820; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 5px 8px;
      border-radius: 999px;
      background: #f2f6f4;
      color: #53656b;
      font-size: 12px;
      font-weight: 900;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid #164f55;
      background: #214b55;
      color: #fff;
      font-weight: 950;
      text-align: center;
    }
    .btn.secondary { color: #214b55; background: #fff; border-color: var(--line); }
    .empty {
      padding: 18px;
      border: 1px dashed #b9d5cb;
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      color: var(--muted);
      font-weight: 850;
    }
    @media (max-width: 940px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .overview { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .shell { width: min(100vw - 12px, 430px); padding-top: 8px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .nav { justify-content: flex-start; }
      .grid, .overview { grid-template-columns: 1fr; }
      .game-card { min-height: 400px; }
      .actions { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">游</span>
        <div>
          <h1>摸鱼游戏平台</h1>
          <span class="sub">统一入口、统一后台、多个小游戏共用同一套平台能力。</span>
        </div>
      </div>
      <nav class="nav">
        <a href="/">稻田摸鱼</a>
        <a href="/fishing.html">湖畔钓鱼</a>
        <a href="/fishing-office.html">上班摸鱼</a>
        <a href="/wallet.html">钱包</a>
      </nav>
    </header>

    <section class="overview" aria-label="平台概览">
      <div class="metric"><strong id="gameCount">-</strong><span>已接入游戏</span></div>
      <div class="metric"><strong id="testingCount">-</strong><span>测试/上线中</span></div>
      <div class="metric"><strong id="prototypeCount">-</strong><span>原型项目</span></div>
      <div class="metric"><strong id="localProgress">-</strong><span>本地收集进度</span></div>
    </section>

    <section class="grid" id="gameGrid" aria-label="游戏列表">
      <div class="empty">正在读取游戏平台目录。</div>
    </section>
  </main>

  <script>
    const fallbackGames = [
      { id: "tank", name: "稻田摸鱼", category: "arcade", status: "online", entry: "/", guide: "/guide.html", description: "主站积分小游戏，适合作为平台账号、钱包和基础记录的验证入口。" },
      { id: "fishing", name: "湖畔钓鱼", category: "casual", status: "testing", entry: "/fishing.html", guide: "/fishing-guide.html", description: "带入场、抛竿、结算和回收逻辑的钓鱼玩法。" },
      { id: "office_fishing", name: "上班摸鱼", category: "casual", status: "prototype", entry: "/fishing-office.html", guide: "/fishing-office.html", description: "面向年轻上班族的轻量钓鱼原型，含图鉴、鱼缸、伪装模式和今日战报。" }
    ];
    const statusText = { online: "已上线", testing: "测试中", prototype: "原型" };
    const categoryText = { arcade: "积分娱乐", casual: "轻量休闲" };

    function officeProgress() {
      try {
        const data = JSON.parse(localStorage.getItem("office_fishing_lake_state_v1") || localStorage.getItem("office_fishing_state_v1") || "{}");
        const unlocked = Object.keys(data.collection || {}).length;
        const coins = Number(data.coins || 0);
        return unlocked ? `${unlocked}/5 · ${coins}币` : "0/5";
      } catch {
        return "0/5";
      }
    }
    function sceneClass(id) {
      if (id === "office_fishing") return "office";
      if (id === "fishing") return "lake";
      return "tank";
    }
    function sceneMarkup(id) {
      if (id === "office_fishing") {
        return `<div class="desk-line"></div><div class="mini-water"></div><i class="visual-fish" style="--x:66%;--y:62%;--c:#ffcf5a;--d:5.8s"></i>`;
      }
      if (id === "fishing") {
        return `<i class="visual-fish" style="--x:44%;--y:66%;--c:#8bd3dd;--d:6.4s"></i><i class="visual-fish" style="--x:62%;--y:75%;--c:#f6c667;--d:7s"></i>`;
      }
      return `<i class="visual-fish" style="--x:22%;--y:54%;--c:#f6c667;--d:6s"></i><i class="visual-fish" style="--x:56%;--y:62%;--c:#f09b72;--d:7.2s"></i>`;
    }
    function render(games) {
      const list = Array.isArray(games) && games.length ? games : fallbackGames;
      const testing = list.filter((game) => game.status === "online" || game.status === "testing").length;
      const prototypes = list.filter((game) => game.status === "prototype").length;
      document.querySelector("#gameCount").textContent = list.length;
      document.querySelector("#testingCount").textContent = testing;
      document.querySelector("#prototypeCount").textContent = prototypes;
      document.querySelector("#localProgress").textContent = officeProgress();
      document.querySelector("#gameGrid").innerHTML = list.map((game) => {
        const status = statusText[game.status] || game.status || "未配置";
        const category = categoryText[game.category] || game.category || "小游戏";
        return `<article class="game-card">
          <div class="scene ${sceneClass(game.id)}">${sceneMarkup(game.id)}</div>
          <div class="content">
            <div class="card-head">
              <h2>${game.name}</h2>
              <span class="status ${game.status || ""}">${status}</span>
            </div>
            <p class="desc">${game.description || "等待配置玩法说明。"}</p>
            <div class="tags">
              <span class="tag">${category}</span>
              <span class="tag">${game.walletMode === "local_storage" ? "本地存档" : "平台账号"}</span>
              <span class="tag">${game.id === "office_fishing" ? `图鉴 ${officeProgress()}` : "后台记录"}</span>
            </div>
            <div class="actions">
              <a class="btn" href="${game.entry || "/"}">进入游戏</a>
              <a class="btn secondary" href="${game.guide || game.entry || "/"}">${game.id === "office_fishing" ? "打开原型" : "玩法说明"}</a>
            </div>
          </div>
        </article>`;
      }).join("");
    }
    fetch("/api/games")
      .then((res) => res.ok ? res.json() : Promise.reject(new Error("catalog unavailable")))
      .then((data) => render(data.games))
      .catch(() => render(fallbackGames));
  </script>
</body>
</html>
