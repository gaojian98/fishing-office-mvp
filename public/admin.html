<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>摸鱼运营后台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2933; background: #eef7f5; }
    button, input, select { font: inherit; }
    button { border: 0; border-radius: 8px; padding: 8px 10px; background: #123f45; color: #fff; font-weight: 900; cursor: pointer; }
    button.ghost { color: #123f45; background: #f7fffd; border: 1px solid #a9cdc6; }
    input, select { border: 1px solid #b7d6d0; border-radius: 8px; padding: 8px; background: #fff; }
    textarea { border: 1px solid #b7d6d0; border-radius: 8px; padding: 8px; background: #fff; font: inherit; resize: vertical; min-height: 58px; }
    .login-wrap { width: min(520px, calc(100vw - 24px)); margin: 12vh auto 0; }
    .login { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; }
    .staff-apply { display: none; margin-top: 10px; }
    .app { display: none; min-height: 100vh; grid-template-columns: 220px 1fr; }
    aside { background: #123f45; color: #ecfeff; padding: 16px 12px; }
    .brand { margin: 0 0 16px; font-size: 24px; font-weight: 950; }
    .menu { display: grid; gap: 6px; }
    .menu button { width: 100%; text-align: left; background: transparent; color: #d7f7f2; border: 1px solid transparent; }
    .menu button.active { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.22); color: #fff; }
    .content { padding: 14px; min-width: 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .topbar h1 { margin: 0; font-size: 28px; }
    .admin-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-weight: 850; }
    .badge { display: inline-flex; align-items: center; min-height: 30px; padding: 5px 9px; border-radius: 999px; background: #fff; border: 1px solid #a9cdc6; color: #31515a; }
    .card { border: 1px solid #b7d6d0; background: rgba(255,255,255,.86); border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 14px 34px rgba(45,86,82,.1); }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .metric { padding: 12px; border: 1px solid #d1e7e2; border-radius: 8px; background: #fbfffe; }
    .metric span { display: block; color: #64748b; font-size: 12px; font-weight: 850; }
    .metric strong { display: block; margin-top: 5px; color: #0b4850; font-size: 24px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tabs button.active { background: #0f766e; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .form-grid label { display: grid; gap: 5px; color: #31515a; font-size: 12px; font-weight: 850; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .danger-text { color: #b91c1c; font-weight: 900; }
    .table-wrap { overflow: auto; border: 1px solid #d7e9e5; border-radius: 8px; background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 760px; }
    th, td { border-bottom: 1px solid #e3efec; padding: 7px; text-align: left; vertical-align: top; white-space: nowrap; }
    th { background: #f1faf8; color: #31515a; font-weight: 950; }
    td.muted { color: #64748b; }
    .status-pending { color: #b45309; font-weight: 950; }
    .status-approved { color: #0f766e; font-weight: 950; }
    .status-rejected { color: #b91c1c; font-weight: 950; }
    .status-online { color: #0f766e; font-weight: 950; }
    .status-prototype { color: #2c7be5; font-weight: 950; }
    .status-maintenance { color: #b45309; font-weight: 950; }
    .status-offline { color: #64748b; font-weight: 950; }
    .status-disabled { color: #64748b; font-weight: 950; }
    .status-blacklisted { color: #7f1d1d; font-weight: 950; }
    .actions { display: flex; gap: 6px; }
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .channel-card { border: 1px solid #d1e7e2; border-radius: 8px; background: #fbfffe; padding: 12px; display: grid; gap: 8px; }
    .channel-card strong { color: #0b4850; font-size: 18px; }
    .checks { display: grid; gap: 6px; color: #31515a; font-weight: 850; }
    .checks label { display: flex; align-items: center; gap: 7px; }
    .checks input { width: auto; }
    .rule-grid { display: grid; gap: 10px; }
    .rule-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; padding: 10px; border: 1px solid #d1e7e2; border-radius: 8px; background: #fbfffe; }
    .rule-row label { display: grid; gap: 5px; color: #31515a; font-size: 12px; font-weight: 850; }
    .rule-row .checks { align-self: center; }
    .list-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .list-item { border: 1px solid #d1e7e2; border-radius: 8px; background: #fbfffe; padding: 12px; }
    .list-item strong { display: block; color: #0b4850; margin-bottom: 6px; }
    .list-item p { margin: 0; color: #64748b; font-weight: 850; line-height: 1.5; }
    .empty { padding: 18px; color: #64748b; font-weight: 850; }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      aside { position: sticky; top: 0; z-index: 2; }
      .menu { grid-template-columns: repeat(4, 1fr); }
      .menu button { text-align: center; padding: 7px 5px; font-size: 12px; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .panel-grid { grid-template-columns: 1fr; }
      .channel-grid { grid-template-columns: 1fr; }
      .list-grid { grid-template-columns: 1fr; }
      .rule-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .login { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="login-wrap" id="loginBox">
    <h1>摸鱼运营后台</h1>
    <section class="card login">
      <input id="username" placeholder="管理员用户名">
      <input id="password" type="password" placeholder="密码">
      <button id="loginBtn">登录</button>
      <button class="ghost" id="showApplyBtn" type="button">申请客服账号</button>
    </section>
    <section class="card staff-apply" id="staffApplyBox">
      <h2>申请后台账号</h2>
      <div class="panel-grid">
        <input id="applyUsername" placeholder="登录账号">
        <input id="applyPassword" type="password" placeholder="登录密码，至少6位">
        <input id="applyName" placeholder="姓名 / 昵称">
        <input id="applyPhone" placeholder="手机号码">
        <select id="applyRole">
          <option value="customer_service">客服</option>
          <option value="finance">财务</option>
          <option value="risk">风控</option>
          <option value="operations">运营</option>
        </select>
        <input id="applyReason" placeholder="申请说明">
      </div>
      <div style="height:10px"></div>
      <button id="submitApplyBtn" type="button">提交申请</button>
      <div class="empty">提交后由超级管理员在系统设置里审批，通过前不能登录后台。</div>
    </section>
  </main>

  <section class="app" id="adminBox">
    <aside>
      <p class="brand">摸鱼后台</p>
      <nav class="menu" id="menu"></nav>
    </aside>
    <div class="content">
      <header class="topbar">
        <h1 id="pageTitle">数据总览</h1>
        <div class="admin-meta">
          <span class="badge" id="adminName">管理员</span>
          <span class="badge" id="todoBadge">待办 0</span>
          <button class="ghost" id="refreshBtn">刷新</button>
          <button id="logoutBtn">退出</button>
        </div>
      </header>
      <section id="view"></section>
    </div>
  </section>

  <script>
    const tokenKey = "moyu_token";
    const qs = (s) => document.querySelector(s);
    const modules = [
      { id: "dashboard", name: "数据总览" },
      { id: "members", name: "会员管理" },
      { id: "funds", name: "资金管理" },
      { id: "games", name: "游戏管理" },
      { id: "marketing", name: "营销活动" },
      { id: "referrals", name: "推荐系统" },
      { id: "bot", name: "机器人管理" },
      { id: "risk", name: "风控管理" },
      { id: "settings", name: "系统设置" }
    ];
    let state = { me: null, module: "dashboard", tab: "users", selectedUserId: "", memberFilters: {}, cache: {} };
    const staffRoles = { admin: "超级管理员", customer_service: "客服", finance: "财务", risk: "风控", operations: "运营" };
    const moduleNames = { dashboard: "数据总览", members: "会员管理", funds: "资金管理", games: "游戏管理", marketing: "营销活动", referrals: "推荐系统", bot: "机器人管理", risk: "风控管理", settings: "系统设置" };

    async function api(path, options = {}) {
      const headers = { "content-type": "application/json", ...(options.headers || {}) };
      const token = localStorage.getItem(tokenKey);
      if (token) headers.authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }
    async function safeApi(path, fallback) {
      try { return await api(path); } catch { return fallback; }
    }

    function escapeHtml(text) {
      return String(text ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    }
    function money(value) { return Number(value || 0).toLocaleString("zh-CN"); }
    function time(value) { return value ? new Date(value).toLocaleString("zh-CN", { hour12: false }) : "-"; }
    function statusText(value) {
      const map = { pending: "待审核", approved: "已通过", rejected: "已拒绝", online: "在线", prototype: "原型", maintenance: "维护中", offline: "已下线", open: "进行中", finished: "已结算", active: "正常", disabled: "已停用", blacklisted: "黑名单" };
      return `<span class="status-${escapeHtml(value)}">${map[value] || escapeHtml(value || "-")}</span>`;
    }

    async function login() {
      try {
        const data = await api("/api/auth/login", { method: "POST", body: JSON.stringify({ username: qs("#username").value, password: qs("#password").value }) });
        localStorage.setItem(tokenKey, data.token);
        await init();
      } catch (e) { alert(e.message); }
    }

    async function init() {
      try {
        const data = await api("/api/me");
        if (data.user.role === "player") throw new Error("不是管理员账号");
        state.me = data.user;
        qs("#loginBox").style.display = "none";
        qs("#adminBox").style.display = "grid";
        qs("#adminName").textContent = `管理员：${data.user.username}`;
        renderMenu();
        await loadAll();
        render();
      } catch {
        qs("#loginBox").style.display = "block";
        qs("#adminBox").style.display = "none";
      }
    }

    function renderMenu() {
      const allowed = allowedModules();
      if (!allowed.some((item) => item.id === state.module)) state.module = allowed[0]?.id || "dashboard";
      qs("#menu").innerHTML = allowed.map((item) => `<button class="${state.module === item.id ? "active" : ""}" data-module="${item.id}">${item.name}</button>`).join("");
      qs("#menu").querySelectorAll("button").forEach((btn) => btn.onclick = () => {
        state.module = btn.dataset.module;
        state.tab = defaultTab(state.module);
        renderMenu();
        render();
      });
    }

    function defaultTab(module) {
      return ({ dashboard: "overview", members: "users", funds: "recharges", games: "platform", marketing: "referral-bonus", referrals: "tree", bot: "status", risk: "risk-users", settings: "admins" })[module] || "overview";
    }
    function allowedModules() {
      if (!state.me || state.me.role === "admin") return modules;
      const permissions = Array.isArray(state.me.adminPermissions) ? state.me.adminPermissions : [];
      return modules.filter((item) => permissions.includes(item.id));
    }

    async function loadAll() {
      const [summary, users, recharges, withdrawals, transactions, valueLedger, rounds, fishingRounds, paymentChannels, operationLogs, financeSettings, fishingSettings, marketingSettings, botCenter, systemStatus, gamePlatform, platformConfig] = await Promise.all([
        safeApi("/api/admin/summary", {}),
        safeApi("/api/admin/list/users", { rows: [] }),
        safeApi("/api/admin/list/recharges", { rows: [] }),
        safeApi("/api/admin/list/withdrawals", { rows: [] }),
        safeApi("/api/admin/list/transactions", { rows: [] }),
        safeApi("/api/admin/list/valueLedger", { rows: [] }),
        safeApi("/api/admin/list/rounds", { rows: [] }),
        safeApi("/api/admin/list/fishingRounds", { rows: [] }),
        safeApi("/api/admin/list/paymentChannels", { rows: [] }),
        safeApi("/api/admin/list/operationLogs", { rows: [] }),
        safeApi("/api/finance-settings", { settings: {} }),
        safeApi("/api/fishing/settings", { settings: {} }),
        safeApi("/api/marketing-settings", { settings: {} }),
        safeApi("/api/admin/bot-center", { groups: [], templates: [], logs: [] }),
        safeApi("/api/admin/system-status", { status: null }),
        safeApi("/api/admin/game-platform", { platform: { games: [], recentRounds: [], shared: {}, valueUnits: [] } }),
        safeApi("/api/platform/config", { config: { platform: {}, valueUnits: [], games: [] } })
      ]);
      state.cache = { summary, users: users.rows, recharges: recharges.rows, withdrawals: withdrawals.rows, transactions: transactions.rows, valueLedger: valueLedger.rows, rounds: rounds.rows, fishingRounds: fishingRounds.rows, paymentChannels: paymentChannels.rows, operationLogs: operationLogs.rows, financeSettings: financeSettings.settings, fishingSettings: fishingSettings.settings, marketingSettings: marketingSettings.settings, botCenter, systemStatus: systemStatus.status, gamePlatform: gamePlatform.platform, platformConfig: platformConfig.config };
      qs("#todoBadge").textContent = `待办 ${Number(summary.pendingRecharges || 0) + Number(summary.pendingWithdrawals || 0)}`;
    }

    function render() {
      const mod = modules.find((m) => m.id === state.module);
      qs("#pageTitle").textContent = mod?.name || "运营后台";
      if (state.module === "dashboard") return renderDashboard();
      if (state.module === "members") return renderMembers();
      if (state.module === "funds") return renderFunds();
      if (state.module === "games") return renderGames();
      if (state.module === "marketing") return renderMarketing();
      if (state.module === "referrals") return renderReferrals();
      if (state.module === "bot") return renderBot();
      if (state.module === "risk") return renderRisk();
      return renderSettings();
    }

    function metrics(items) {
      return `<section class="metrics">${items.map((item) => `<div class="metric"><span>${item.label}</span><strong>${item.value}</strong></div>`).join("")}</section>`;
    }
    function card(title, body) { return `<section class="card"><h2>${title}</h2>${body}</section>`; }
    function tabs(items) {
      return `<div class="tabs">${items.map((item) => `<button class="${state.tab === item.id ? "active" : "ghost"}" data-tab="${item.id}">${item.name}</button>`).join("")}</div>`;
    }
    function featureGrid(items) {
      return `<div class="list-grid">${items.map(([title, text]) => `<div class="list-item"><strong>${escapeHtml(title)}</strong><p>${escapeHtml(text)}</p></div>`).join("")}</div>`;
    }
    function bindTabs() {
      qs("#view").querySelectorAll("[data-tab]").forEach((btn) => btn.onclick = () => { state.tab = btn.dataset.tab; render(); });
    }

    function table(headers, rows) {
      if (!rows.length) return `<div class="empty">暂无数据</div>`;
      return `<div class="table-wrap"><table><thead><tr>${headers.map((h) => `<th>${h.label}</th>`).join("")}<th>操作</th></tr></thead><tbody>${rows.map((row) => `<tr>${headers.map((h) => `<td>${h.render ? h.render(row) : escapeHtml(row[h.key])}</td>`).join("")}<td>${rowActions(row)}</td></tr>`).join("")}</tbody></table></div>`;
    }
    function rowActions(row) {
      if (row.__kind && row.status === "pending") {
        return `<div class="actions"><button onclick="review('${row.__kind}','${row.id}','approved')">通过</button><button class="ghost" onclick="review('${row.__kind}','${row.id}','rejected')">拒绝</button></div>`;
      }
      if (row.__user) {
        const restore = row.status === "active" ? `<button class="ghost" onclick="setMemberStatus('${escapeHtml(row.id)}','disabled')">停用</button>` : `<button onclick="setMemberStatus('${escapeHtml(row.id)}','active')">恢复</button>`;
        const blacklist = row.status === "blacklisted" ? "" : `<button class="ghost" onclick="setMemberStatus('${escapeHtml(row.id)}','blacklisted')">拉黑</button>`;
        return `<div class="actions"><button class="ghost" onclick="viewUserDetail('${escapeHtml(row.id)}')">详情</button>${restore}${blacklist}</div>`;
      }
      if (row.__staffReview) {
        return `<div class="actions"><button onclick="reviewStaff('${escapeHtml(row.id)}','approved')">通过</button><button class="ghost" onclick="reviewStaff('${escapeHtml(row.id)}','rejected')">拒绝</button></div>`;
      }
      if (row.__staff) {
        return `<button class="ghost" onclick="state.tab='roles'; render()">分配权限</button>`;
      }
      return `<span class="muted">-</span>`;
    }

    function renderDashboard() {
      const s = state.cache.summary;
      const pending = [...state.cache.recharges.filter((o) => o.status === "pending").map((o) => ({ ...o, __kind: "recharge" })), ...state.cache.withdrawals.filter((o) => o.status === "pending").map((o) => ({ ...o, __kind: "withdraw" }))];
      const tabsHtml = tabs([{ id: "overview", name: "运营概览" }, { id: "today", name: "今日数据" }, { id: "todo", name: "待办事项" }, { id: "finance-summary", name: "资金概览" }]);
      const overview = metrics([
        { label: "总会员", value: money(s.players) },
        { label: "总局数", value: money(s.rounds) },
        { label: "平台盈亏", value: money(s.platformProfit) },
        { label: "总摸鱼币余额", value: money(s.totalBalance) },
        { label: "冻结摸鱼币", value: money(s.totalFrozen) },
        { label: "待审充值", value: money(s.pendingRecharges) },
        { label: "待审提现", value: money(s.pendingWithdrawals) },
        { label: "机器人菜单", value: "7" }
      ]);
      const today = metrics([
        { label: "今日新增会员", value: money(s.todayPlayers) },
        { label: "今日游戏局数", value: money(s.todayRounds) },
        { label: "今日充值", value: money(s.todayRechargeAmount) },
        { label: "今日提现", value: money(s.todayWithdrawAmount) },
        { label: "今日平台盈亏", value: money(s.todayPlatformProfit) },
        { label: "今日待办", value: money(s.pendingRecharges + s.pendingWithdrawals) },
        { label: "今日风险提示", value: money(state.cache.users.filter((u) => Number(u.balance) < 0).length) },
        { label: "今日活动配置", value: "已启用" }
      ]);
      const body = state.tab === "today" ? today :
        state.tab === "todo" ? orderTable(pending) :
        state.tab === "finance-summary" ? metrics([
          { label: "总摸鱼币余额", value: money(s.totalBalance) },
          { label: "冻结摸鱼币", value: money(s.totalFrozen) },
          { label: "待审充值", value: money(s.pendingRecharges) },
          { label: "待审提现", value: money(s.pendingWithdrawals) },
          { label: "今日充值", value: money(s.todayRechargeAmount) },
          { label: "今日提现", value: money(s.todayWithdrawAmount) },
          { label: "平台盈亏", value: money(s.platformProfit) },
          { label: "USDT汇率", value: money(state.cache.financeSettings?.usdt_vnd_rate) }
        ]) :
        overview;
      qs("#view").innerHTML = tabsHtml + card("数据总览", body);
      bindTabs();
    }

    function renderMembers() {
      qs("#view").innerHTML = tabs([{ id: "users", name: "会员列表" }, { id: "search", name: "会员查询" }, { id: "profiles", name: "会员详情" }, { id: "adjust", name: "摸鱼币调整" }, { id: "status", name: "账号状态" }, { id: "telegram-users", name: "TG会员" }]) +
        (state.tab === "users" ? card("会员列表", userTable(state.cache.users)) :
        state.tab === "search" ? memberSearchPanel() :
        state.tab === "profiles" ? memberDetailPanel() :
        state.tab === "status" ? memberStatusPanel() :
        state.tab === "telegram-users" ? card("TG会员", userTable(state.cache.users.filter((u) => u.telegram_id || u.telegram_username))) :
        memberAdjustPanel());
      bindTabs();
    }

    function renderFunds() {
      const tabsHtml = tabs([{ id: "recharges", name: "充值订单" }, { id: "withdrawals", name: "提现订单" }, { id: "channels", name: "支付通道" }, { id: "rates", name: "汇率设置" }, { id: "value-units", name: "价值单位" }, { id: "transactions", name: "钱包流水" }, { id: "value-ledger", name: "价值流水" }, { id: "exchange", name: "兑换订单" }]);
      const exchangeOrders = state.cache.withdrawals.filter((order) => String(order.note || "").includes("兑换现金") || String(order.note || "").includes("摸鱼币"));
      const body = state.tab === "recharges" ? orderTable(state.cache.recharges.map((o) => ({ ...o, __kind: "recharge" }))) :
        state.tab === "withdrawals" ? orderTable(state.cache.withdrawals.map((o) => ({ ...o, __kind: "withdraw" }))) :
        state.tab === "channels" ? paymentChannelPanel(state.cache.paymentChannels) :
        state.tab === "rates" ? financeSettingsPanel(state.cache.financeSettings) :
        state.tab === "value-units" ? valueUnitPanel() :
        state.tab === "transactions" ? txTable(state.cache.transactions) :
        state.tab === "value-ledger" ? valueLedgerTable(state.cache.valueLedger || []) :
        orderTable(exchangeOrders.map((o) => ({ ...o, __kind: "withdraw" })));
      qs("#view").innerHTML = tabsHtml + card("资金管理", body);
      bindTabs();
    }

    function renderGames() {

    function permissionChecks(user) {
      const permissions = new Set(normalizedUserPermissions(user));
      return `<div class="checks">${Object.entries(moduleNames).map(([id, name]) => `

    function normalizedUserPermissions(user) {
      if (Array.isArray(user.admin_permissions)) return user.admin_permissions;
      if (Array.isArray(user.adminPermissions)) return user.adminPermissions;
      if (typeof user.admin_permissions === "string") {
        try { return JSON.parse(user.admin_permissions); } catch { return user.admin_permissions.split(","); }
      }
      const defaults = {
        admin: Object.keys(moduleNames),
        customer_service: ["dashboard", "members", "funds", "bot"],
        finance: ["dashboard", "funds", "members"],
        risk: ["dashboard", "members", "games", "risk"],

    function filterMembers() {
      const filters = state.memberFilters || {};
      const keyword = String(filters.keyword || "").trim().toLowerCase();
      const start = filters.start ? new Date(`${filters.start}T00:00:00`).getTime() : 0;
      const end = filters.end ? new Date(`${filters.end}T23:59:59`).getTime() : Infinity;
      const minBalance = filters.minBalance === "" || filters.minBalance == null ? -Infinity : Number(filters.minBalance);
      const maxBalance = filters.maxBalance === "" || filters.maxBalance == null ? Infinity : Number(filters.maxBalance);
      return state.cache.users.filter((user) => {
        const haystack = [user.username, user.id, user.user_no, user.phone, user.telegram_id, user.telegram_username, user.referral_code].join(" ").toLowerCase();
        const created = user.created_at ? new Date(user.created_at).getTime() : 0;
        const balance = Number(user.balance || 0);
        if (keyword && !haystack.includes(keyword)) return false;
        if (created < start || created > end) return false;
        if (balance < minBalance || balance > maxBalance) return false;
        if (filters.status === "active" && user.status !== "active") return false;
        if (filters.status === "frozen" && user.status === "active") return false;
        if (filters.status === "negative" && balance >= 0) return false;
        if (filters.status === "telegram" && !user.telegram_id && !user.telegram_username) return false;
        return true;
      });
    }

    const fishingIds = ["grouper", "yellow", "eel", "empty"];
    const fishingNames = { grouper: "石斑鱼", yellow: "黄鱼", eel: "鳗鱼", empty: "空竿" };
    function jsonCell(value, fallback) {
      if (value == null) return fallback;
      if (typeof value === "string") {
        try { return JSON.parse(value); } catch { return fallback; }
      }
      return value;

    function normalizedFishingSettings(settings = {}) {
      const fallback = {
        enabled: true,
        entry_cost: 20,
        attempts: 5,
        outcomes: [
          { id: "grouper", name: "石斑鱼", probability: 10, price: 20 },
          { id: "yellow", name: "黄鱼", probability: 40, price: 3 },
          { id: "eel", name: "鳗鱼", probability: 30, price: 1 },
          { id: "empty", name: "空竿", probability: 20, price: 0 }
        ]
      };
      const source = { ...fallback, ...(settings || {}) };
      const outcomes = fishingIds.map((id) => {
        const base = fallback.outcomes.find((item) => item.id === id);
        const current = (source.outcomes || []).find((item) => item.id === id) || {};
        return { id, name: fishingNames[id], probability: Number(current.probability ?? base.probability), price: Number(current.price ?? base.price) };
      });
      return { enabled: source.enabled !== false, entry_cost: Number(source.entry_cost || 20), attempts: Number(source.attempts || 5), outcomes };
    }
    function fishingStats(settings) {
      const perCast = settings.outcomes.reduce((total, item) => total + (Number(item.probability) / 100) * Number(item.price), 0);
      const recovery = perCast * Number(settings.attempts);
      const playerEv = recovery - Number(settings.entry_cost);
      return {
        totalProbability: settings.outcomes.reduce((total, item) => total + Number(item.probability), 0),
        expectedRecovery: recovery,
        playerEv,
        ownerEv: -playerEv,
        rtp: Number(settings.entry_cost) ? (recovery / Number(settings.entry_cost)) * 100 : 0
      };
    }
    function fishingSettingsPanel(settings = {}) {

          <td><input id="fishing-price-${item.id}" type="number" min="0" step="1" value="${item.price}"></td>
        </tr>`).join("");
      return `
        <div class="panel-grid">
          <div class="list-item">
            <strong>基础规则</strong>
            <div class="rule-grid">
              <label class="checks"><input id="fishing-enabled" type="checkbox" ${s.enabled ? "checked" : ""}> 启用钓鱼游戏</label>

            </div>

            <strong>理论测算</strong>
            <p>概率合计：${stats.totalProbability.toFixed(1)}%</p>
            <p>单局平均回收：${stats.expectedRecovery.toFixed(2)} 积分</p>
            <p>玩家单局期望：${stats.playerEv.toFixed(2)} 积分</p>
            <p>庄家单局期望：${stats.ownerEv.toFixed(2)} 积分，RTP ${stats.rtp.toFixed(2)}%</p>
          </div>
        </div>
        <div class="table-wrap" style="margin-top:10px">
          <table>
            <thead><tr><th>结果</th><th>出现概率 %</th><th>回收价格（积分）</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>

        checkin: {
          enabled: checkedValue("marketing-checkin-enabled", checkin.enabled !== false),
          consecutive_days: numberValue("checkin-days", checkin.consecutive_days || 7),
          reward_points: numberValue("checkin-reward", checkin.reward_points || 0)
        },
        recharge: {
          enabled: checkedValue("marketing-recharge-enabled", recharge.enabled !== false),
          tiers: Array.from({ length: 5 }, (_, index) => ({
            recharge_points: numberValue(`recharge-condition-${index}`, recharge.tiers?.[index]?.recharge_points || 0),
            reward_points: numberValue(`recharge-reward-${index}`, recharge.tiers?.[index]?.reward_points || 0),
            enabled: checkedValue(`recharge-tier-enabled-${index}`, recharge.tiers?.[index]?.enabled !== false)
          }))
        }
      };
    }
    window.saveMarketingSettings = async () => {
      try {
        await api("/api/admin/marketing-settings", { method: "POST", body: JSON.stringify(currentMarketingDraft()) });
        await loadAll();
        render();
      } catch (e) { alert(e.message); }
    };
    window.sendTelegramBroadcast = async () => {
      const text = document.getElementById("broadcastText").value.trim();
      const templateId = document.getElementById("broadcastTemplate")?.value || "";
      const audience = document.getElementById("broadcastAllGroups")?.checked ? "enabled_groups" : document.getElementById("broadcastAudience").value;
      if (!templateId && !text) return alert("请选择模板或输入消息内容");
      if (!confirm("确认发送这条 Telegram 消息？")) return;
      try {
        const data = await api("/api/admin/telegram/broadcast", {
          method: "POST",
          body: JSON.stringify({ audience, text, template_id: templateId })
        });
        document.getElementById("broadcastResult").textContent = `发送完成：目标 ${data.result.total} 人，成功 ${data.result.sent} 人，失败 ${data.result.failed} 人。`;
        await loadAll();
      } catch (e) { alert(e.message); }
    };
    window.saveBotGroup = async () => {
      try {
        await api("/api/admin/bot-group", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("botGroupName").value,
            chat_id: document.getElementById("botGroupChatId").value,
            enabled: document.getElementById("botGroupEnabled").value === "true"
          })
        });
        await loadAll();
        render();
      } catch (e) { alert(e.message); }
    };
    window.saveMessageTemplate = async () => {
      try {
        await api("/api/admin/message-template", {
          method: "POST",
          body: JSON.stringify({
            title: document.getElementById("templateTitle").value,
            body: document.getElementById("templateBody").value,
            image_url: document.getElementById("templateImage").value,
            video_url: document.getElementById("templateVideo").value,
            button_text: document.getElementById("templateButtonText").value,
            button_url: document.getElementById("templateButtonUrl").value,
            enabled: true
          })
        });
        await loadAll();
        render();
      } catch (e) { alert(e.message); }
    };

    qs("#loginBtn").onclick = login;
    qs("#showApplyBtn").onclick = () => { qs("#staffApplyBox").style.display = qs("#staffApplyBox").style.display === "block" ? "none" : "block"; };
    qs("#submitApplyBtn").onclick = submitStaffApplication;
    qs("#logoutBtn").onclick = () => { localStorage.removeItem(tokenKey); location.reload(); };
    qs("#refreshBtn").onclick = async () => { await loadAll(); render(); };
    init();
  </script>
</body>
</html>
