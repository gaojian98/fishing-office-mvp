<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的钱包</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: linear-gradient(180deg, #e4f6f1, #f8fbfa);
    }
    main { width: min(900px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0 32px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 54px); line-height: 1; }
    h2 { margin: 0 0 10px; font-size: 20px; }
    a, button { border: 0; border-radius: 8px; padding: 10px 12px; color: #fff; background: #123f45; font: inherit; font-weight: 900; text-decoration: none; cursor: pointer; }
    button.secondary, a.secondary { background: #4b6f73; }
    input, textarea { width: 100%; border: 1px solid #b7d6d0; border-radius: 8px; padding: 10px; background: #fff; font: inherit; }
    textarea { resize: vertical; min-height: 72px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .card {
      border: 1px solid #a9cdc6;
      border-radius: 8px;
      background: rgba(255,255,255,.82);
      box-shadow: 0 14px 34px rgba(45,86,82,.12);
      padding: 14px;
    }
    .metric { min-height: 96px; display: grid; align-content: center; }
    .label { color: #64748b; font-size: 13px; font-weight: 800; }
    .value { margin-top: 4px; color: #0b4850; font-size: 26px; font-weight: 950; overflow-wrap: anywhere; }
    .forms { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid { display: grid; gap: 8px; }
    .full { grid-column: 1 / -1; }
    .message { margin: 0 0 12px; color: #0f766e; font-weight: 900; min-height: 20px; }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid, .forms { grid-template-columns: 1fr; }
      a, button { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>我的钱包</h1>
      <a class="secondary" href="/">返回游戏</a>
    </header>

    <p class="message" id="message"></p>

    <section class="grid">
      <div class="card metric">
        <div class="label">账号</div>
        <div class="value" id="username">-</div>
      </div>
      <div class="card metric">
        <div class="label">账号积分</div>
        <div class="value" id="balance">0</div>
      </div>
      <div class="card metric">
        <div class="label">冻结积分</div>
        <div class="value" id="frozen">0</div>
      </div>
      <div class="card metric full">
        <div class="label">推荐码</div>
        <div class="value" id="referralCode">-</div>
      </div>
    </section>

    <section class="forms">
      <div class="card">
        <h2>充值申请</h2>
        <div class="form-grid">
          <input id="rechargeAmount" type="number" min="1" placeholder="充值积分">
          <textarea id="rechargeNote" placeholder="转账说明或凭证"></textarea>
          <button id="rechargeBtn">提交充值</button>
        </div>
      </div>

      <div class="card">
        <h2>提现申请</h2>
        <div class="form-grid">
          <input id="withdrawAmount" type="number" min="1" placeholder="提现积分">
          <input id="withdrawAccount" placeholder="提现账号 / 钱包地址">
          <button id="withdrawBtn">提交提现</button>
        </div>
      </div>

      <div class="card full">
        <h2>修改密码</h2>
        <div class="form-grid">
          <input id="oldPassword" type="password" placeholder="原密码">
          <input id="newPassword" type="password" placeholder="新密码，至少 6 位">
          <button id="passwordBtn">确认修改</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const tokenKey = "moyu_token";
    const qs = (s) => document.querySelector(s);
    let me = null;

    async function api(path, options = {}) {
      const headers = { "content-type": "application/json", ...(options.headers || {}) };
      const token = localStorage.getItem(tokenKey);
      if (token) headers.authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    function show(message) {
      qs("#message").textContent = message;
    }

    async function loadMe() {
      try {
        const data = await api("/api/me");
        me = data.user;
        qs("#username").textContent = me.username;
        qs("#balance").textContent = me.balance;
        qs("#frozen").textContent = me.frozen;
        qs("#referralCode").textContent = me.referralCode;
      } catch {
        location.href = "/";
      }
    }

    async function submitOrder(kind) {
      if (!me) return;
      try {
        const path = kind === "recharge" ? "/api/recharge" : "/api/withdraw";
        const body = kind === "recharge"
          ? { amount: Number(qs("#rechargeAmount").value), note: qs("#rechargeNote").value }
          : { amount: Number(qs("#withdrawAmount").value), account: qs("#withdrawAccount").value };
        await api(path, { method: "POST", body: JSON.stringify(body) });
        show("已提交，等待后台审核。");
        await loadMe();
      } catch (error) {
        show(error.message);
      }
    }

    async function changePassword() {
      try {
        await api("/api/auth/change-password", {
          method: "POST",
          body: JSON.stringify({ oldPassword: qs("#oldPassword").value, newPassword: qs("#newPassword").value })
        });
        qs("#oldPassword").value = "";
        qs("#newPassword").value = "";
        show("密码已修改。");
      } catch (error) {
        show(error.message);
      }
    }

    qs("#rechargeBtn").onclick = () => submitOrder("recharge");
    qs("#withdrawBtn").onclick = () => submitOrder("withdraw");
    qs("#passwordBtn").onclick = changePassword;
    loadMe();
  </script>
</body>
</html>
