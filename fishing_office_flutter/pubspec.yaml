name: fishing_office
description: "上班摸鱼 Fishing Office mobile game home prototype."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  xml: ^6.5.0
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/Home.png
    - assets/config/Layout.json
    - assets/config/Interaction.json
    - assets/config/Animation.json
    - assets/config/Routes.json
    - assets/config/Dialog.json
    - assets/config/Economy.json
    - assets/config/GameState.json
    - assets/config/store/Layout.json
    - assets/config/store/Interaction.json
    - assets/config/store/Dialog.json
    - assets/config/store/Animation.json
    - assets/config/store/Routes.json
    - assets/config/store/Data.json
